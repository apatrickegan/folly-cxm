<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CXM Leads</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 150%; }
:root {
  --bg:      #0b0d14;
  --surface: #11131d;
  --card:    #181b29;
  --card-hi: #1e2233;
  --border:  #262a40;
  --text:    #e8ecf5;
  --muted:   #7681a0;
  --dim:     #9ca3af;
  --accent:  #6366f1;
  --ok:      #22c55e;
  --warn:    #f59e0b;
  --col-a:   #ef4444;
  --col-b:   #f97316;
  --col-c:   #3b82f6;
  --col-x:   #6b7280;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  background: linear-gradient(180deg, var(--surface), #0e1019);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
#header h1 {
  font-size: 1rem; font-weight: 800; color: var(--text);
  white-space: nowrap; letter-spacing: .3px;
}
#header h1 span { color: var(--accent); }
#search {
  flex: 1; min-width: 120px; max-width: 240px;
  padding: 6px 11px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: .78rem; outline: none;
  transition: border-color .12s, box-shadow .12s;
}
#search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.18); }
.filters { display: flex; gap: 5px; flex-wrap: wrap; }
.f-btn {
  padding: 4px 11px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); font-size: .7rem; cursor: pointer;
  transition: all .12s; white-space: nowrap; font-weight: 600;
}
.f-btn:hover { color: var(--text); border-color: #3a4060; }
.f-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
#clock { font-size: .75rem; color: var(--muted); margin-left: auto; white-space: nowrap; font-variant-numeric: tabular-nums; }
#stats-bar { display: flex; gap: 12px; font-size: .68rem; color: var(--muted); align-items: center; }
.stat { display: flex; align-items: center; gap: 4px; font-weight: 600; }
.sdot { width: 7px; height: 7px; border-radius: 50%; }

/* ── Columns ── */
#board { display: flex; flex: 1; overflow: hidden; gap: 0; }
.col {
  display: flex; flex-direction: column; flex: 1; min-width: 0;
  border-right: 1px solid var(--border); overflow: hidden;
}
.col:last-child { border-right: none; }
.col-head {
  padding: 9px 14px; font-size: .72rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 2px solid; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.col-A .col-head { color: var(--col-a); border-color: var(--col-a); }
.col-A-pinned { flex: 1; min-width: 0; max-width: 100%; border: none; background: var(--bg); }
.col-A-pinned .col-cards {
  display: grid; grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: min-content; align-content: start;
  overflow-y: auto; flex: 1; height: 0; gap: 8px; padding: 9px;
}
.col-A-pinned .lead-card { width: 100%; margin-bottom: 0; }
.col-B, .col-C, .col-X { display: none; }
.col-B .col-head { color: var(--col-b); border-color: var(--col-b); }
.col-C .col-head { color: var(--col-c); border-color: var(--col-c); }
.col-X .col-head { color: var(--col-x); border-color: var(--col-x); }
.col-count { font-size: .68rem; opacity: .7; font-weight: 600; }
.col-cards { overflow-y: auto; flex: 1; padding: 9px; display: flex; flex-direction: column; gap: 8px; }
.col-cards::-webkit-scrollbar { width: 4px; }
.col-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.col-cards.drag-over { background: rgba(99,102,241,.07); }

/* ── Lead Cards ── */
.lead-card {
  position: relative;
  background: linear-gradient(180deg, var(--card), #15182360);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 11px 8px;
  cursor: grab;
  touch-action: none;
  user-select: none;
  border-left: 3px solid transparent;
  transition: box-shadow .12s, transform .12s, border-color .12s;
}
.lead-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.35); border-color: #323862; }
.lead-card:active { cursor: grabbing; }
.lead-card.dragging { opacity: .4; pointer-events: none; }
.lead-card.drag-placeholder {
  border: 2px dashed var(--accent); background: rgba(99,102,241,.06);
  min-height: 60px; border-left: 3px solid var(--accent); pointer-events: none;
}
.lead-card.busy { opacity: .55; pointer-events: none; }
.lead-card.removing { opacity: 0; transform: scale(.94); }
.col-A .lead-card { border-left-color: var(--col-a); }
.col-B .lead-card { border-left-color: var(--col-b); }
.col-C .lead-card { border-left-color: var(--col-c); }
.col-X .lead-card { border-left-color: var(--col-x); }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
.card-name { font-size: .95rem; font-weight: 700; color: var(--text); line-height: 1.25; flex: 1; }
.badges { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.badge {
  font-size: .6rem; padding: 2px 6px; border-radius: 4px;
  font-weight: 800; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap;
}
.b-A  { background: #450a0a; color: #fca5a5; }
.b-B  { background: #431407; color: #fdba74; }
.b-C  { background: #172554; color: #93c5fd; }
.b-X  { background: #1f2937; color: #9ca3af; }
.b-Hot     { background: #450a0a; color: #fca5a5; }
.b-Listing { background: #2e1065; color: #c4b5fd; }
.b-Buyer   { background: #052e16; color: #86efac; }
.b-General { background: #0c1a2e; color: #7dd3fc; }
.b-type    { background: #1f2937; color: #9ca3af; }

.card-agent { font-size: .65rem; color: var(--muted); margin-top: 5px; }
.card-added { font-size: .72rem; color: var(--dim); margin-top: 2px; }
.card-step  { font-size: .7rem; color: #aab4cc; margin-top: 5px; line-height: 1.35; }
.card-step::before { content: '→ '; color: var(--accent); font-weight: 800; }
.card-dates { font-size: .63rem; color: #8b95ff; margin-top: 4px; }

/* ── Tasks ── */
.tasks-section { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 6px; }
.task-item { display: flex; align-items: flex-start; gap: 7px; padding: 3px 0; font-size: .68rem; line-height: 1.35; }
.task-check {
  width: 14px; height: 14px; border-radius: 4px;
  border: 1.5px solid #3a4060; background: transparent;
  cursor: pointer; flex-shrink: 0; margin-top: 1px;
  appearance: none; -webkit-appearance: none; transition: all .1s;
}
.task-check:checked { background: var(--ok); border-color: var(--ok); }
.task-check.in_progress { border-color: var(--warn); }
.task-check.done { background: #374151; border-color: #374151; }
.task-title { flex: 1; color: #cbd5e1; }
.task-title.done { text-decoration: line-through; color: var(--muted); }
.task-due {
  color: var(--muted); font-size: .58rem; white-space: nowrap;
  background: #0e1019; border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px;
}
.task-due.overdue { color: #fca5a5; border-color: #4c1d1d; background: #2a0f0f; }
.tasks-loading { font-size: .63rem; color: var(--muted); padding: 3px 0; font-style: italic; }
.tasks-more { font-size: .62rem; color: var(--accent); padding: 3px 0 1px; font-weight: 600; }

/* ── Card action footer ── */
.card-actions {
  display: flex; gap: 6px; margin-top: 9px;
  opacity: .35; transition: opacity .12s;
}
.lead-card:hover .card-actions { opacity: 1; }
.act-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 5px 8px; border-radius: 7px; cursor: pointer;
  font-size: .64rem; font-weight: 700; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); transition: all .12s; white-space: nowrap;
}
.act-complete:hover { background: rgba(34,197,94,.14); color: #86efac; border-color: #1d5e36; }
.act-archive:hover  { background: rgba(245,158,11,.12); color: #fcd34d; border-color: #6b4d12; }

/* inline confirm */
.card-confirm {
  margin-top: 9px; padding: 7px 8px; border-radius: 8px;
  background: #0e1019; border: 1px solid var(--border);
}
.confirm-msg { font-size: .64rem; color: var(--text); margin-bottom: 6px; font-weight: 600; }
.confirm-row { display: flex; gap: 5px; flex-wrap: wrap; }
.confirm-row .act-btn { flex: 1; }
.c-yes { color: #86efac; border-color: #1d5e36; }
.c-yes:hover { background: rgba(34,197,94,.18); }
.c-no  { color: var(--muted); }
.c-no:hover { background: var(--card-hi); color: var(--text); }
.reason-chip {
  flex: 1; padding: 5px 6px; border-radius: 7px; cursor: pointer;
  font-size: .62rem; font-weight: 700; text-align: center;
  border: 1px solid var(--border); background: var(--bg); color: var(--muted); transition: all .12s;
}
.reason-chip:hover { background: var(--card-hi); color: var(--text); border-color: #3a4060; }

/* ── Drag ghost ── */
#ghost {
  position: fixed; pointer-events: none; z-index: 9999;
  opacity: .9; transform: rotate(1.5deg) scale(1.03); width: 240px; display: none;
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(8px);
  background: #181b29; border: 1px solid var(--accent); color: var(--text);
  padding: 9px 20px; border-radius: 9px; font-size: .78rem; font-weight: 600;
  opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; z-index: 9998;
  box-shadow: 0 10px 30px rgba(0,0,0,.4);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok  { border-color: var(--ok); }
#toast.err { border-color: var(--col-a); }
</style>
</head>
<body>

<div id="header">
  <h1><span>⚡</span> CXM Leads</h1>
  <input id="search" type="text" placeholder="Search…">
  <div class="filters">
    <button class="f-btn on" data-f="all">All</button>
    <button class="f-btn" data-f="Hot">Hot</button>
    <button class="f-btn" data-f="Buyer">Buyer</button>
    <button class="f-btn" data-f="Listing">Listing</button>
    <button class="f-btn" data-f="General">General</button>
  </div>
  <div id="stats-bar">
    <div class="stat"><div class="sdot" style="background:var(--col-a)"></div><span id="s-a">A: —</span></div>
    <div class="stat"><div class="sdot" style="background:var(--col-b)"></div><span id="s-b">B: —</span></div>
    <div class="stat"><div class="sdot" style="background:var(--col-c)"></div><span id="s-c">C: —</span></div>
    <span id="s-total" style="color:var(--muted);font-size:.65rem;"></span>
  </div>
  <div id="clock"></div>
</div>

<div id="board">
  <div class="col col-A col-A-pinned" data-priority="A">
    <div class="col-head">Priority A <span class="col-count" id="cnt-A"></span></div>
    <div class="col-cards" id="cards-A"></div>
  </div>
  <div class="col col-B" data-priority="B">
    <div class="col-head">Priority B <span class="col-count" id="cnt-B"></span></div>
    <div class="col-cards" id="cards-B"></div>
  </div>
  <div class="col col-C" data-priority="C">
    <div class="col-head">Priority C <span class="col-count" id="cnt-C"></span></div>
    <div class="col-cards" id="cards-C"></div>
  </div>
  <div class="col col-X" data-priority="">
    <div class="col-head">Other <span class="col-count" id="cnt-X"></span></div>
    <div class="col-cards" id="cards-X"></div>
  </div>
</div>

<div id="ghost"></div>
<div id="toast"></div>

<script>
let leads = [];
let tasks = {};        // leadId → task[]
let filterType = 'all';
let searchQ = '';
let dragCard = null;
let dragLeadId = null;
let placeholder = null;
let ghost = document.getElementById('ghost');

const MAX_TASKS = 5;
const COLS = { A: 'cards-A', B: 'cards-B', C: 'cards-C', '': 'cards-X' };

// ── Clock ──────────────────────────────────────────────
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleDateString('en-CA') + ' ' +
    n.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
}
setInterval(tick, 1000); tick();

// ── Toast ──────────────────────────────────────────────
function toast(msg, kind = '', ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + kind;
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── Data ──────────────────────────────────────────────
async function loadLeads() {
  const r = await fetch('/api/leads');
  leads = await r.json();
  renderAll();
  loadTasksBatched();
}

async function loadTasksBatched() {
  const ids = leads.map(l => l.id);
  const size = 8;
  for (let i = 0; i < ids.length; i += size) {
    const batch = ids.slice(i, i + size);
    await Promise.all(batch.map(async id => {
      try {
        const r = await fetch(`/api/leads/${id}/tasks`);
        tasks[id] = await r.json();
        refreshCardTasks(id);
      } catch {}
    }));
  }
}

// ── Render ─────────────────────────────────────────────
function filteredLeads() {
  return leads.filter(l => {
    if (filterType !== 'all' && l.type !== filterType) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      return (l.name||'').toLowerCase().includes(q) ||
             (l.agent||'').toLowerCase().includes(q) ||
             (l.nextStep||'').toLowerCase().includes(q) ||
             (l.company||'').toLowerCase().includes(q);
    }
    return true;
  });
}

function renderAll() {
  const fl = filteredLeads();
  Object.values(COLS).forEach(id => { document.getElementById(id).innerHTML = ''; });

  const counts = { A: 0, B: 0, C: 0, '': 0 };
  fl.forEach(l => {
    const p = l.priority || '';
    const col = document.getElementById(COLS[p] || 'cards-X');
    col.appendChild(buildCard(l));
    counts[p] = (counts[p] || 0) + 1;
  });

  document.getElementById('cnt-A').textContent = `(${counts.A})`;
  document.getElementById('cnt-B').textContent = `(${counts.B})`;
  document.getElementById('cnt-C').textContent = `(${counts.C})`;
  document.getElementById('cnt-X').textContent = `(${counts['']||0})`;
  document.getElementById('s-a').textContent = `A: ${leads.filter(l=>l.priority==='A').length}`;
  document.getElementById('s-b').textContent = `B: ${leads.filter(l=>l.priority==='B').length}`;
  document.getElementById('s-c').textContent = `C: ${leads.filter(l=>l.priority==='C').length}`;
  document.getElementById('s-total').textContent = `${fl.length} shown / ${leads.length} total`;
}

function typeBadgeClass(type) {
  const map = { Hot:'b-Hot', Listing:'b-Listing', Buyer:'b-Buyer', General:'b-General' };
  return map[type] || 'b-type';
}

function leadDates(l) {
  const d = [];
  if (l.closingDate)    d.push('🔑 Close ' + l.closingDate.slice(0,10));
  if (l.expiryDate)     d.push('⏰ Exp ' + l.expiryDate.slice(0,10));
  if (l.contractDate)   d.push('📝 Cntr ' + l.contractDate.slice(0,10));
  if (l.possessionDate) d.push('🏠 Poss ' + l.possessionDate.slice(0,10));
  if (l.soldDate)       d.push('💰 Sold ' + l.soldDate.slice(0,10));
  return d.join('  ');
}

function buildCard(l) {
  const card = document.createElement('div');
  card.className = 'lead-card';
  card.dataset.id = l.id;
  card.dataset.priority = l.priority || '';

  const p = l.priority || 'X';
  const dates = leadDates(l);

  card.innerHTML = `
    <div class="card-top">
      <div class="card-name">${esc(l.name)}</div>
      <div class="badges">
        <span class="badge b-${p}">${p}</span>
        <span class="badge ${typeBadgeClass(l.type)}">${esc(l.type||'—')}</span>
      </div>
    </div>
    ${l.agent ? `<div class="card-agent">👤 ${esc(l.agent)}</div>` : ''}
    ${l.createdAt ? `<div class="card-added">Added ${fmtDate(l.createdAt)}</div>` : ''}
    ${l.nextStep && l.nextStep !== 'None' ? `<div class="card-step">${esc(l.nextStep)}</div>` : ''}
    ${dates ? `<div class="card-dates">${dates}</div>` : ''}
    <div class="tasks-section" id="tasks-${l.id}">
      <div class="tasks-loading">Loading tasks…</div>
    </div>
    <div class="card-actions" id="actions-${l.id}">
      <div class="act-btn act-complete" data-act="complete" data-id="${l.id}">✓ Complete</div>
      <div class="act-btn act-archive"  data-act="archive"  data-id="${l.id}">🗄 Archive</div>
    </div>
  `;

  setupDrag(card, l);
  wireActions(card, l);

  if (tasks[l.id] !== undefined) renderTasks(l.id);
  return card;
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' });
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Tasks (up to 5 upcoming, soonest due first) ────────
function renderTasks(leadId) {
  const section = document.getElementById(`tasks-${leadId}`);
  if (!section) return;
  const t = tasks[leadId] || [];
  if (!t.length) { section.innerHTML = ''; return; }

  const today = new Date().toISOString().slice(0,10);
  const pending = t.filter(x => x.status !== 'done' && x.status !== 'cancelled')
                   .sort((a, b) => (a.dueDate || '9999').slice(0,10).localeCompare((b.dueDate || '9999').slice(0,10)));

  const shown = pending.slice(0, MAX_TASKS);
  let html = '';
  shown.forEach(task => {
    const isIP = task.status === 'in_progress';
    const due  = task.dueDate ? task.dueDate.slice(0,10) : '';
    const overdue = due && due < today;
    html += `
      <div class="task-item">
        <input type="checkbox" class="task-check ${task.status}"
          data-lead="${leadId}" data-task="${task.id}">
        <span class="task-title">${esc(task.title)}</span>
        ${due ? `<span class="task-due ${overdue?'overdue':''}">${due}</span>` : ''}
      </div>`;
  });
  const extra = pending.length - shown.length;
  if (extra > 0) html += `<div class="tasks-more">+${extra} more upcoming</div>`;
  section.innerHTML = html;

  section.querySelectorAll('.task-check').forEach(cb => {
    cb.addEventListener('change', async e => {
      e.stopPropagation();
      const { lead, task } = cb.dataset;
      const status = cb.checked ? 'done' : 'pending';
      await fetch(`/api/leads/${lead}/tasks/${task}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      tasks[lead] = tasks[lead].map(t => t.id === task ? { ...t, status } : t);
      renderTasks(lead);
      toast(status === 'done' ? '✓ Task done' : '↩ Task reopened', 'ok');
    });
  });
}

function refreshCardTasks(leadId) {
  const section = document.getElementById(`tasks-${leadId}`);
  if (section) renderTasks(leadId);
}

// ── Complete / Archive actions ─────────────────────────
function wireActions(card, lead) {
  card.querySelectorAll('.act-btn[data-act]').forEach(btn => {
    btn.addEventListener('mousedown', e => e.stopPropagation());
    btn.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (btn.dataset.act === 'complete') showCompleteConfirm(card, lead);
      else showArchiveConfirm(card, lead);
    });
  });
}

function actionsEl(card) { return card.querySelector('.card-actions') || card.querySelector('.card-confirm'); }

function resetActions(card, lead) {
  const cur = actionsEl(card);
  if (!cur) return;
  const div = document.createElement('div');
  div.className = 'card-actions';
  div.id = `actions-${lead.id}`;
  div.innerHTML = `
    <div class="act-btn act-complete" data-act="complete" data-id="${lead.id}">✓ Complete</div>
    <div class="act-btn act-archive"  data-act="archive"  data-id="${lead.id}">🗄 Archive</div>`;
  cur.replaceWith(div);
  wireActions(card, lead);
}

function swapToConfirm(card, html) {
  const cur = actionsEl(card);
  if (!cur) return null;
  const div = document.createElement('div');
  div.className = 'card-confirm';
  div.innerHTML = html;
  cur.replaceWith(div);
  div.querySelectorAll('*').forEach(el => {
    el.addEventListener('mousedown', e => e.stopPropagation());
    el.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
  });
  return div;
}

function showCompleteConfirm(card, lead) {
  const div = swapToConfirm(card, `
    <div class="confirm-msg">Complete this lead? Patrick gets an email.</div>
    <div class="confirm-row">
      <div class="act-btn c-yes" data-yes>✓ Yes, complete</div>
      <div class="act-btn c-no" data-no>Cancel</div>
    </div>`);
  if (!div) return;
  div.querySelector('[data-yes]').addEventListener('click', e => { e.stopPropagation(); doComplete(card, lead); });
  div.querySelector('[data-no]').addEventListener('click', e => { e.stopPropagation(); resetActions(card, lead); });
}

function showArchiveConfirm(card, lead) {
  const div = swapToConfirm(card, `
    <div class="confirm-msg">Archive — why?</div>
    <div class="confirm-row">
      <div class="reason-chip" data-reason="expired">Expired</div>
      <div class="reason-chip" data-reason="cancelled">Lost</div>
      <div class="reason-chip" data-reason="other">Other</div>
      <div class="reason-chip c-no" data-no>Cancel</div>
    </div>`);
  if (!div) return;
  div.querySelectorAll('[data-reason]').forEach(chip =>
    chip.addEventListener('click', e => { e.stopPropagation(); doArchive(card, lead, chip.dataset.reason); }));
  div.querySelector('[data-no]').addEventListener('click', e => { e.stopPropagation(); resetActions(card, lead); });
}

function removeCard(card, leadId) {
  card.classList.add('removing');
  leads = leads.filter(l => l.id !== leadId);
  setTimeout(() => renderAll(), 250);
}

async function doComplete(card, lead) {
  card.classList.add('busy');
  try {
    const r = await fetch(`/api/leads/${lead.id}/complete`, { method: 'POST' });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'failed');
    removeCard(card, lead.id);
    toast(data.emailSent ? `✅ Completed — Patrick emailed` : `✅ Completed (email: ${data.emailMessage})`, 'ok', 3200);
  } catch (err) {
    card.classList.remove('busy');
    toast('Failed to complete — ' + err.message, 'err', 3200);
  }
}

async function doArchive(card, lead, reason) {
  card.classList.add('busy');
  try {
    const r = await fetch(`/api/leads/${lead.id}/archive`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason })
    });
    if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.error || 'failed'); }
    removeCard(card, lead.id);
    toast(`🗄 Archived (${reason})`, 'ok');
  } catch (err) {
    card.classList.remove('busy');
    toast('Failed to archive — ' + err.message, 'err', 3200);
  }
}

// ── Drag & Drop ────────────────────────────────────────
function setupDrag(card, lead) {
  card.addEventListener('mousedown', e => {
    if (e.target.closest('.task-check')) return;
    if (e.target.closest('.card-actions')) return;
    if (e.target.closest('.card-confirm')) return;
    if (e.button !== 0) return;
    initDrag(e.clientX, e.clientY, card, lead);
  });
  card.addEventListener('touchstart', e => {
    if (e.target.closest('.task-check')) return;
    if (e.target.closest('.card-actions')) return;
    if (e.target.closest('.card-confirm')) return;
    e.preventDefault();
    const t = e.changedTouches[0];
    initDrag(t.clientX, t.clientY, card, lead);
  }, { passive: false });
}

function initDrag(x, y, card, lead) {
  dragCard = card;
  dragLeadId = lead.id;

  ghost.innerHTML = card.outerHTML;
  ghost.style.display = 'block';
  ghost.style.width = card.offsetWidth + 'px';
  moveGhost(x, y);

  placeholder = document.createElement('div');
  placeholder.className = 'lead-card drag-placeholder';
  placeholder.style.height = card.offsetHeight + 'px';
  card.parentNode.insertBefore(placeholder, card);
  card.classList.add('dragging');

  const onMove = (ex, ey) => { moveGhost(ex, ey); highlightDrop(ex, ey); };
  const onEnd = (ex, ey) => {
    finishDrag(ex, ey, lead);
    window.removeEventListener('mousemove', mMove);
    window.removeEventListener('touchmove', tMove, { passive: false });
    window.removeEventListener('mouseup', mUp);
    window.removeEventListener('touchend', tEnd);
  };

  const mMove = e => onMove(e.clientX, e.clientY);
  const tMove = e => { e.preventDefault(); const t=e.changedTouches[0]; onMove(t.clientX, t.clientY); };
  const mUp   = e => onEnd(e.clientX, e.clientY);
  const tEnd  = e => { const t=e.changedTouches[0]; onEnd(t.clientX, t.clientY); };

  window.addEventListener('mousemove', mMove);
  window.addEventListener('touchmove', tMove, { passive: false });
  window.addEventListener('mouseup', mUp, { once: true });
  window.addEventListener('touchend', tEnd, { once: true });
}

function moveGhost(x, y) {
  ghost.style.left = (x + 10) + 'px';
  ghost.style.top  = (y - 15) + 'px';
}

function highlightDrop(x, y) {
  document.querySelectorAll('.col-cards').forEach(c => c.classList.remove('drag-over'));
  const el = document.elementFromPoint(x, y);
  const col = el && el.closest('.col-cards');
  if (col) col.classList.add('drag-over');
}

async function finishDrag(x, y, lead) {
  ghost.style.display = 'none';
  if (dragCard) dragCard.classList.remove('dragging');
  if (placeholder) placeholder.remove();
  document.querySelectorAll('.col-cards').forEach(c => c.classList.remove('drag-over'));

  const el = document.elementFromPoint(x, y);
  const colEl = el && el.closest('.col');
  const newPriority = colEl ? colEl.dataset.priority : null;

  if (newPriority !== null && newPriority !== lead.priority) {
    const oldPriority = lead.priority;
    leads = leads.map(l => l.id === lead.id ? { ...l, priority: newPriority } : l);
    renderAll();
    try {
      await fetch(`/api/leads/${lead.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ priority: newPriority || null })
      });
      toast(`Moved to Priority ${newPriority || 'Other'}`, 'ok');
    } catch {
      leads = leads.map(l => l.id === lead.id ? { ...l, priority: oldPriority } : l);
      renderAll();
      toast('Failed to update — reverted', 'err');
    }
  } else {
    renderAll();
  }

  dragCard = null; dragLeadId = null; placeholder = null;
}

// ── Filters & Search ───────────────────────────────────
document.querySelectorAll('.f-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.f-btn').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    filterType = b.dataset.f;
    renderAll();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  renderAll();
});

// ── Boot ──────────────────────────────────────────────
loadLeads();
setInterval(loadLeads, 120000);
</script>
